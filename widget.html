<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Parts Selector</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── Widget ── */
.widget { background: #fff; border-radius: 20px; box-shadow: 0 32px 80px rgba(0,0,0,.45); width: 100%; max-width: 480px; }
.widget-body   { padding: 20px 20px 10px; }
.widget-footer { padding: 10px 20px 20px; }

/* ── Selected car block ── */
.sc-block {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #f5f8ff;
  border: 1.5px solid #e0e8ff;
  border-radius: 14px;
  padding: 13px 16px;
  margin-bottom: 18px;
  min-height: 72px;
  transition: border-color .2s, background .2s;
}
.sc-block.filled { border-color: #0f3460; background: #eef3ff; }
.sc-img {
  width: 48px; height: 48px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #dce6f7;
}
.sc-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sc-info { flex: 1; min-width: 0; }
.sc-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a2e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sc-title.placeholder { color: #bbb; font-weight: 400; }
.sc-sub { font-size: 12px; color: #888; margin-top: 3px; }

/* ── Labels ── */
.w-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 9px; }

/* ── Maker chips ── */
.maker-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.maker-chip {
  padding: 5px 13px;
  background: #f5f7ff; border: 1.5px solid #e0e8ff;
  border-radius: 20px; font-size: 12px; font-weight: 600; color: #0f3460;
  cursor: pointer; font-family: inherit;
  transition: background .12s, border-color .12s, opacity .2s;
  white-space: nowrap;
}
.maker-chip:hover  { background: #deeaff; border-color: #b0caff; }
.maker-chip.active { background: #0f3460; border-color: #0f3460; color: #fff; }
.maker-chip.dimmed { opacity: .4; }

/* ── Divider ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 12px;
  color: #ccc; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }

/* ── Step chips (groups / models) ── */
.step-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.step-chip {
  padding: 5px 13px;
  background: #f5f7ff; border: 1.5px solid #e0e8ff;
  border-radius: 20px; font-size: 12px; font-weight: 600; color: #0f3460;
  cursor: pointer; font-family: inherit;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
.step-chip:hover { background: #deeaff; border-color: #b0caff; }

/* ── Trail ── */
.trail {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 5px; margin-top: 14px;
}
.trail-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: #0f3460; border-radius: 20px;
  padding: 4px 9px 4px 12px;
  font-size: 12px; font-weight: 600; color: #fff;
  white-space: nowrap; animation: chipIn .18s ease;
}
@keyframes chipIn { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
.trail-sep { color: #ccc; font-size: 13px; }
.trail-x { font-size: 15px; color: rgba(255,255,255,.55); cursor: pointer; line-height: 1; transition: color .12s; }
.trail-x:hover { color: #fff; }

/* ── Engine list ── */
.eng-search {
  display: flex; align-items: center; gap: 8px;
  border: 1.5px solid #e8e8e8; border-radius: 8px;
  padding: 9px 12px; background: #fafafa;
  transition: border-color .15s; margin-bottom: 8px;
}
.eng-search:focus-within { border-color: #0f3460; background: #fff; }
.eng-search svg { width: 13px; height: 13px; color: #aaa; flex-shrink: 0; }
.eng-search input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; color: #1a1a2e; font-family: inherit; }
.eng-search input::placeholder { color: #bbb; }

.eng-list {
  border: 1.5px solid #f0f0f0; border-radius: 10px;
  overflow: hidden; max-height: 240px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #e8e8e8 transparent;
}
.eng-list::-webkit-scrollbar { width: 4px; }
.eng-list::-webkit-scrollbar-thumb { background: #e8e8e8; border-radius: 4px; }
.eng-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; cursor: pointer;
  border-bottom: 1px solid #f5f5f5; transition: background .1s;
}
.eng-item:last-child { border-bottom: none; }
.eng-item:hover { background: #f5f8ff; }
.eng-name { font-size: 14px; color: #1a1a2e; font-weight: 500; }
.eng-sub  { font-size: 11px; color: #999; margin-top: 2px; }
.eng-chev { color: #ddd; font-size: 16px; flex-shrink: 0; margin-left: 8px; }
.eng-empty { padding: 28px; text-align: center; color: #bbb; font-size: 13px; }

/* ── Dynamic section fade ── */
.dyn { animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ── Find Parts ── */
.find-btn {
  width: 100%; padding: 14px;
  background: #e8a020; border: none; border-radius: 10px;
  color: #fff; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s;
}
.find-btn:hover:not(:disabled) { background: #d4911a; }
.find-btn:disabled { background: #e8e8e8; color: #bbb; cursor: not-allowed; }
.find-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="widget">
  <div class="widget-body">

    <!-- Selected car block -->
    <div class="sc-block" id="scBlock">
      <div class="sc-img">
        <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=96&h=96&fit=crop&q=80" alt="">
      </div>
      <div class="sc-info">
        <div class="sc-title placeholder" id="scTitle">Select your vehicle</div>
        <div class="sc-sub" id="scSub">Choose make, model and engine</div>
      </div>
    </div>

    <!-- Maker chips -->
    <div class="w-label">Popular makes</div>
    <div id="makerChips" class="maker-chips"></div>

    <!-- Trail -->
    <div id="trail" class="trail" style="display:none"></div>

    <!-- Dynamic step content -->
    <div id="dynSection" style="display:none"></div>

  </div>
  <div class="widget-footer">
    <button id="findBtn" class="find-btn" disabled>
      <div class="spinner"></div> Loading…
    </button>
  </div>
</div>

<script>
let MAKERS = [], ALL_CARS = [];

// make → group (modelName c[2]) → model (carName c[4] distinct) → engine (carId c[3])
const S = { make:null, makeName:null, group:null, model:null, engine:null, engineRow:null };

const SVG_SEARCH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;
const CAR_IMG = 'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=96&h=96&fit=crop&q=80';

fetch('cars_data.json').then(r => r.json()).then(data => {
  MAKERS   = data.makers;
  ALL_CARS = data.cars;
  renderMakerChips();
  setFindBtn(false);
}).catch(() => {
  document.getElementById('findBtn').textContent = 'Failed to load — use a server';
});

// ── Selected car block ────────────────────────────────────
function updateScBlock() {
  const block = document.getElementById('scBlock');
  const title = document.getElementById('scTitle');
  const sub   = document.getElementById('scSub');
  const parts = [S.makeName, S.group, S.model].filter(Boolean);

  if (!parts.length) {
    block.classList.remove('filled');
    title.className = 'sc-title placeholder';
    title.textContent = 'Select your vehicle';
    sub.textContent = 'Choose make, model and engine';
    return;
  }

  block.classList.add('filled');
  title.className = 'sc-title';
  title.textContent = parts.join(' · ');

  if (S.engineRow) {
    const r = S.engineRow;
    const details = [
      r[5] ? r[5].split('/')[0] : '',
      r[6] && r[7] ? `${r[6]}–${r[7]}` : r[6] ? `from ${r[6]}` : '',
      r[8] ? `${r[8]} kW` : ''
    ].filter(Boolean).join(' · ');
    sub.textContent = details || '';
  } else {
    sub.textContent = '';
  }
}

// ── Maker chips ───────────────────────────────────────────
function renderMakerChips() {
  const counts = {};
  ALL_CARS.forEach(c => { counts[c[0]] = (counts[c[0]] || 0) + 1; });

  let top = MAKERS
    .map(m => ({ ...m, count: counts[m.id] || 0 }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 10);

  if (S.make) top = [...top.filter(m => m.id === S.make), ...top.filter(m => m.id !== S.make)];

  document.getElementById('makerChips').innerHTML = top.map(m => {
    const cls = S.make ? (m.id === S.make ? 'maker-chip active' : 'maker-chip dimmed') : 'maker-chip';
    return `<button class="${cls}" onclick="selectMake(${m.id},'${esc(m.n)}')">${m.n}</button>`;
  }).join('');
}

// ── Level 1: select make → show top-10 groups ─────────────
function selectMake(id, name) {
  S.make = id; S.makeName = name; S.group = null; S.model = null; S.engine = null; S.engineRow = null;
  renderMakerChips();
  renderTrail();
  updateScBlock();
  showGroups();
  setFindBtn(false);
}

function showGroups() {
  const counts = {};
  ALL_CARS.filter(c => c[0] === S.make).forEach(c => { counts[c[2]] = (counts[c[2]] || 0) + 1; });
  const groups = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,10).map(([n]) => n);
  showChips('group', 'Select model', groups, n => `selectGroup('${esc(n)}')`);
}

// ── Level 2: select group → show top-10 models ────────────
function selectGroup(name) {
  S.group = name; S.model = null; S.engine = null; S.engineRow = null;
  renderTrail();
  updateScBlock();
  showModels();
  setFindBtn(false);
}

function showModels() {
  const counts = {};
  ALL_CARS.filter(c => c[0] === S.make && c[2] === S.group)
          .forEach(c => { counts[c[4]] = (counts[c[4]] || 0) + 1; });
  const models = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,10).map(([n]) => n);
  showChips('model', 'Select engine variant', models, n => `selectModel('${esc(n)}')`);
}

// ── Level 3: select model → show engine list ──────────────
function selectModel(name) {
  S.model = name; S.engine = null; S.engineRow = null;
  renderTrail();
  updateScBlock();
  showEngines('');
  setFindBtn(false);
}

function showEngines(filter) {
  const cars = ALL_CARS.filter(c =>
    c[0] === S.make && c[2] === S.group && c[4] === S.model &&
    (!filter || (c[5]||'').toLowerCase().includes(filter) ||
                String(c[6]||'').includes(filter) ||
                String(c[8]||'').includes(filter))
  );

  const dyn = document.getElementById('dynSection');
  dyn.className = 'dyn'; dyn.style.display = 'block';
  dyn.innerHTML = `
    <div class="divider">engine</div>
    <div class="w-label">Select engine</div>
    <div class="eng-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="engSearch" type="text" placeholder="Filter by fuel, year, kW…" autocomplete="off" value="${filter}">
    </div>
    <div class="eng-list">
      ${cars.length ? cars.map(c => {
        const sub = [
          c[5] ? c[5].split('/')[0] : '',
          c[6] && c[7] ? `${c[6]}–${c[7]}` : c[6] ? `from ${c[6]}` : '',
          c[8] ? `${c[8]} kW` : ''
        ].filter(Boolean).join(' · ');
        return `<div class="eng-item" onclick="selectEngine(${c[3]})">
          <div>
            <div class="eng-name">${c[4]}</div>
            ${sub ? `<div class="eng-sub">${sub}</div>` : ''}
          </div>
          <span class="eng-chev">›</span>
        </div>`;
      }).join('') : '<div class="eng-empty">No results</div>'}
    </div>`;

  document.getElementById('engSearch').addEventListener('input', function() {
    showEngines(this.value.trim().toLowerCase());
  });
}

// ── Level 4: select engine → done ─────────────────────────
function selectEngine(carId) {
  const row = ALL_CARS.find(c => c[3] === carId);
  S.engine = carId; S.engineRow = row;
  renderTrail();
  updateScBlock();
  document.getElementById('dynSection').style.display = 'none';
  setFindBtn(true);
}

// ── Trail ─────────────────────────────────────────────────
function renderTrail() {
  const trail = document.getElementById('trail');
  const items = [
    S.make   && { label: S.makeName, step: 'make'  },
    S.group  && { label: S.group,    step: 'group' },
    S.model  && { label: S.model,    step: 'model' },
    S.engine && {
      label: [
        S.engineRow?.[5]?.split('/')[0],
        S.engineRow?.[6] && S.engineRow?.[7] ? `${S.engineRow[6]}–${S.engineRow[7]}` : null,
        S.engineRow?.[8] ? `${S.engineRow[8]} kW` : null
      ].filter(Boolean).join(' · ') || 'Engine',
      step: 'engine'
    },
  ].filter(Boolean);

  if (!items.length) { trail.style.display = 'none'; return; }
  trail.style.display = 'flex';
  trail.innerHTML = items.map((it, i) =>
    `${i ? '<span class="trail-sep">›</span>' : ''}
     <div class="trail-chip">${it.label}<span class="trail-x" onclick="resetTo('${it.step}')">×</span></div>`
  ).join('');
}

// ── Reset ─────────────────────────────────────────────────
function resetTo(step) {
  const dyn = document.getElementById('dynSection');
  if (step === 'make') {
    Object.assign(S, { make:null, makeName:null, group:null, model:null, engine:null, engineRow:null });
    renderMakerChips(); renderTrail(); updateScBlock();
    dyn.style.display = 'none'; setFindBtn(false);
  } else if (step === 'group') {
    Object.assign(S, { group:null, model:null, engine:null, engineRow:null });
    renderTrail(); updateScBlock(); showGroups(); setFindBtn(false);
  } else if (step === 'model') {
    Object.assign(S, { model:null, engine:null, engineRow:null });
    renderTrail(); updateScBlock(); showModels(); setFindBtn(false);
  } else if (step === 'engine') {
    Object.assign(S, { engine:null, engineRow:null });
    renderTrail(); updateScBlock(); showEngines(''); setFindBtn(false);
  }
}

// ── Chip renderer helper ──────────────────────────────────
function showChips(dividerLabel, label, items, onclickFn) {
  const dyn = document.getElementById('dynSection');
  dyn.className = 'dyn'; dyn.style.display = 'block';
  dyn.innerHTML = `
    <div class="divider">${dividerLabel}</div>
    <div class="w-label">${label}</div>
    <div class="step-chips">
      ${items.map(n => `<button class="step-chip" onclick="${onclickFn(n)}">${n}</button>`).join('')}
    </div>`;
}

// ── Find Parts ────────────────────────────────────────────
function setFindBtn(ready) {
  const btn = document.getElementById('findBtn');
  btn.disabled = !ready;
  btn.innerHTML = `${SVG_SEARCH} Find Parts`;
}

// ── Helpers ───────────────────────────────────────────────
function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>

</body>
</html>
