<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Parts Selector</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── Widget card ── */
.widget {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 32px 80px rgba(0,0,0,.45);
  width: 100%;
  max-width: 480px;
}
.widget-body  { padding: 22px 22px 10px; }
.widget-footer { padding: 12px 22px 22px; }

/* ── Labels ── */
.w-label {
  font-size: 11px;
  font-weight: 700;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 9px;
}

/* ── Trail ── */
.trail {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  min-height: 30px;
}
.trail-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #0f3460;
  border-radius: 20px;
  padding: 5px 10px 5px 13px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  animation: chipIn .18s ease;
}
@keyframes chipIn {
  from { opacity: 0; transform: scale(.85); }
  to   { opacity: 1; transform: scale(1); }
}
.trail-sep { color: #ccc; font-size: 14px; }
.trail-x {
  font-size: 16px;
  color: rgba(255,255,255,.55);
  cursor: pointer;
  line-height: 1;
  transition: color .12s;
}
.trail-x:hover { color: #fff; }

/* ── Maker chips ── */
.maker-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.maker-chip {
  padding: 5px 13px;
  background: #f5f7ff;
  border: 1.5px solid #e0e8ff;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: #0f3460;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, border-color .12s, opacity .2s;
  white-space: nowrap;
}
.maker-chip:hover   { background: #deeaff; border-color: #b0caff; }
.maker-chip.active  { background: #0f3460; border-color: #0f3460; color: #fff; }
.maker-chip.dimmed  { opacity: .45; }

/* ── Divider ── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 14px 0 12px;
  color: #ccc;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }

/* ── Group chips (models) ── */
.group-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.group-chip {
  padding: 5px 13px;
  background: #f5f7ff;
  border: 1.5px solid #e0e8ff;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: #0f3460;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s, border-color .12s;
  white-space: nowrap;
}
.group-chip:hover { background: #deeaff; border-color: #b0caff; }

/* ── Search box ── */
.dyn-search {
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1.5px solid #e8e8e8;
  border-radius: 8px;
  padding: 9px 12px;
  background: #fafafa;
  transition: border-color .15s;
  margin-bottom: 8px;
}
.dyn-search:focus-within { border-color: #0f3460; background: #fff; }
.dyn-search svg { width: 13px; height: 13px; color: #aaa; flex-shrink: 0; }
.dyn-search input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: 14px;
  color: #1a1a2e;
  font-family: inherit;
}
.dyn-search input::placeholder { color: #bbb; }

/* ── Car list ── */
.car-list {
  border: 1.5px solid #f0f0f0;
  border-radius: 10px;
  overflow: hidden;
  max-height: 260px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #e8e8e8 transparent;
}
.car-list::-webkit-scrollbar { width: 4px; }
.car-list::-webkit-scrollbar-thumb { background: #e8e8e8; border-radius: 4px; }
.car-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
  transition: background .1s;
}
.car-item:last-child { border-bottom: none; }
.car-item:hover { background: #f5f8ff; }
.car-item-name { font-size: 14px; color: #1a1a2e; font-weight: 500; }
.car-item-sub  { font-size: 11px; color: #999; margin-top: 2px; }
.car-item-chev { color: #ddd; font-size: 16px; flex-shrink: 0; margin-left: 8px; }
.list-empty    { padding: 32px; text-align: center; color: #bbb; font-size: 13px; }

/* ── Find Parts button ── */
.find-btn {
  width: 100%;
  padding: 14px;
  background: #e8a020;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.find-btn:hover:not(:disabled) { background: #d4911a; }
.find-btn:disabled { background: #e8e8e8; color: #bbb; cursor: not-allowed; }
.find-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Fade-in section ── */
.dyn-section { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<div class="widget">
  <div class="widget-body">

    <!-- Trail: selected path -->
    <div id="trail" class="trail" style="display:none"></div>

    <!-- Maker chips -->
    <div class="w-label">Popular makes</div>
    <div id="makerChips" class="maker-chips"></div>

    <!-- Dynamic section (model groups or engine list) -->
    <div id="dynSection" style="display:none"></div>

  </div>
  <div class="widget-footer">
    <button id="findBtn" class="find-btn" disabled>
      <div class="spinner"></div> Loading…
    </button>
  </div>
</div>

<script>
let MAKERS = [], ALL_CARS = [];
const state = { make: null, makeName: null, model: null, car: null, carName: null };

const SVG_SEARCH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;

fetch('cars_data.json').then(r => r.json()).then(data => {
  MAKERS   = data.makers;
  ALL_CARS = data.cars;
  renderMakerChips();
  setFindBtn(false);
}).catch(() => {
  document.getElementById('findBtn').textContent = 'Failed to load — use a server';
});

// ── Maker chips ────────────────────────────────────────────
function renderMakerChips() {
  const counts = {};
  ALL_CARS.forEach(c => { counts[c[0]] = (counts[c[0]] || 0) + 1; });

  let top = MAKERS
    .map(m => ({ ...m, count: counts[m.id] || 0 }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 10);

  // Move active maker to front
  if (state.make) {
    top = [
      ...top.filter(m => m.id === state.make),
      ...top.filter(m => m.id !== state.make)
    ];
  }

  document.getElementById('makerChips').innerHTML = top.map(m => {
    const cls = state.make
      ? (m.id === state.make ? 'maker-chip active' : 'maker-chip dimmed')
      : 'maker-chip';
    return `<button class="${cls}" onclick="selectMake(${m.id},'${esc(m.n)}')">${m.n}</button>`;
  }).join('');
}

// ── Select maker ───────────────────────────────────────────
function selectMake(id, name) {
  state.make = id; state.makeName = name;
  state.model = null; state.car = null; state.carName = null;
  renderMakerChips();
  renderTrail();
  renderModelGroups();
  setFindBtn(false);
}

// ── Model groups ───────────────────────────────────────────
function renderModelGroups() {
  const cars = ALL_CARS.filter(c => c[0] === state.make);
  const counts = {};
  cars.forEach(c => { counts[c[2]] = (counts[c[2]] || 0) + 1; });
  const groups = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([name]) => name);

  const dyn = document.getElementById('dynSection');
  dyn.className = 'dyn-section';
  dyn.style.display = 'block';
  dyn.innerHTML = `
    <div class="divider">model</div>
    <div class="w-label">Select model</div>
    <div class="group-chips">
      ${groups.map(g => `<button class="group-chip" onclick="selectModel('${esc(g)}')">${g}</button>`).join('')}
    </div>`;
}

// ── Select model ───────────────────────────────────────────
function selectModel(name) {
  state.model = name; state.car = null; state.carName = null;
  renderTrail();
  renderCarList('');
  setFindBtn(false);
}

// ── Engine / trim list ─────────────────────────────────────
function renderCarList(filter) {
  const cars = ALL_CARS.filter(c =>
    c[0] === state.make && c[2] === state.model &&
    (!filter || c[4].toLowerCase().includes(filter.toLowerCase()))
  );

  const dyn = document.getElementById('dynSection');
  dyn.className = 'dyn-section';
  dyn.style.display = 'block';
  dyn.innerHTML = `
    <div class="divider">engine / trim</div>
    <div class="w-label">Select engine</div>
    <div class="dyn-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="carSearch" type="text" placeholder="Filter…" autocomplete="off" value="${filter}">
    </div>
    <div class="car-list">
      ${cars.length ? cars.map(c => {
        const sub = [
          c[5] ? c[5].split('/')[0] : '',
          c[6] && c[7] ? `${c[6]}–${c[7]}` : c[6] ? `from ${c[6]}` : '',
          c[8] ? `${c[8]} kW` : ''
        ].filter(Boolean).join(' · ');
        return `<div class="car-item" onclick="selectCar(${c[3]},'${esc(c[4])}')">
          <div>
            <div class="car-item-name">${c[4]}</div>
            ${sub ? `<div class="car-item-sub">${sub}</div>` : ''}
          </div>
          <span class="car-item-chev">›</span>
        </div>`;
      }).join('') : '<div class="list-empty">No results</div>'}
    </div>`;

  document.getElementById('carSearch').addEventListener('input', function() {
    renderCarList(this.value.trim());
  });
  document.getElementById('carSearch').focus();
}

// ── Select car ─────────────────────────────────────────────
function selectCar(id, name) {
  state.car = id; state.carName = name;
  renderTrail();
  document.getElementById('dynSection').style.display = 'none';
  setFindBtn(true);
}

// ── Trail ──────────────────────────────────────────────────
function renderTrail() {
  const trail = document.getElementById('trail');
  const items = [
    state.make  && { label: state.makeName, step: 'make'  },
    state.model && { label: state.model,    step: 'model' },
    state.car   && { label: state.carName,  step: 'car'   },
  ].filter(Boolean);

  if (!items.length) { trail.style.display = 'none'; return; }
  trail.style.display = 'flex';
  trail.innerHTML = items.map((it, i) => `
    ${i > 0 ? '<span class="trail-sep">›</span>' : ''}
    <div class="trail-chip">
      ${it.label}
      <span class="trail-x" onclick="resetTo('${it.step}')">×</span>
    </div>`
  ).join('');
}

// ── Reset to step ──────────────────────────────────────────
function resetTo(step) {
  if (step === 'make') {
    state.make = null; state.makeName = null;
    state.model = null; state.car = null; state.carName = null;
    renderMakerChips();
    renderTrail();
    document.getElementById('dynSection').style.display = 'none';
    setFindBtn(false);
  } else if (step === 'model') {
    state.model = null; state.car = null; state.carName = null;
    renderTrail();
    renderModelGroups();
    setFindBtn(false);
  } else if (step === 'car') {
    state.car = null; state.carName = null;
    renderTrail();
    renderCarList('');
    setFindBtn(false);
  }
}

// ── Find Parts button ──────────────────────────────────────
function setFindBtn(ready) {
  const btn = document.getElementById('findBtn');
  btn.disabled = !ready;
  if (ready) {
    const label = [state.makeName, state.model, state.carName].filter(Boolean).join(' · ');
    btn.innerHTML = `${SVG_SEARCH} Find Parts`;
  } else {
    btn.innerHTML = `${SVG_SEARCH} Find Parts`;
  }
}

// ── Helpers ────────────────────────────────────────────────
function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>

</body>
</html>
